<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preventivo Servizi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <main class="max-w-xl mx-auto">
        <section class="bg-white border rounded-xl shadow-md p-4 mb-4">
            <h1 class="text-xl font-bold mb-2">Preventivo Progetto Software</h1>

            <form id="quoteForm" class="space-y-3">
                <div>
                    <label for="fullName" class="block mb-1">Nome completo</label>
                    <input id="fullName" type="text" placeholder="Mario Rossi" class="w-full border rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label for="email" class="block mb-1">Email</label>
                    <input id="email" type="email" placeholder="nome@email.com" class="w-full border rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label for="phone" class="block mb-1">Telefono (10 cifre)</label>
                    <input id="phone" type="text" placeholder="3331234567" class="w-full border rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label for="budget" class="block mb-1">Budget disponibile (€)</label>
                    <input id="budget" type="number" step="0.01" min="0" placeholder="1000" class="w-full border rounded-md shadow-sm p-2">
                </div>

                <fieldset class="border rounded-lg shadow-sm p-3">
                    <legend class="px-1">Servizi richiesti</legend>
                    <div class="space-y-1">
                        <label class="block"><input type="checkbox" name="services" value="html"> HTML</label>
                        <label class="block"><input type="checkbox" name="services" value="php"> PHP</label>
                        <label class="block"><input type="checkbox" name="services" value="asp"> ASP</label>
                        <label class="block"><input type="checkbox" name="services" value="java"> Java</label>
                        <label class="block"><input type="checkbox" name="services" value="cpp"> C++</label>
                    </div>
                </fieldset>

                <div id="formMessage" class="hidden border rounded-md shadow-sm p-2 text-sm"></div>
                <button type="submit" class="w-full bg-blue-600 text-white rounded-md shadow-sm p-2">Calcola preventivo</button>
            </form>
        </section>

        <section id="resultBox" class="hidden bg-white border rounded-xl shadow-md p-4">
            <h2 class="text-lg font-bold mb-2">Riepilogo</h2>
            <p id="resultCustomer" class="mb-1"></p>
            <p id="resultServices" class="mb-1"></p>
            <p id="resultCost" class="mb-1 font-semibold"></p>
            <p id="resultBudgetCheck" class="mb-1 font-semibold"></p>
            <p id="resultCompanyText" class="mt-2 pt-2 border-t"></p>
        </section>
    </main>
    <script src="./script.js"></script>
</body>
</html>
